  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ition:fixed;left:0;right:0;height:130px;z-index:0;pointer-events:none;background:linear-gradient(180deg,transparent,var(--accent),transparent);opacity:.05;animation:scan 11s linear infinite\"><\u002Fdiv>\n\n  <sc-if value=\"{{ showSessionCheck }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:9997;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Orbitron';letter-spacing:3px;font-size:13px\">CONNECTING…<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showAuthScreen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px\">\n      <div style=\"width:100%;max-width:380px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:30px;position:relative;overflow:hidden;box-shadow:0 20px 60px -30px var(--accent)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6\"><\u002Fdiv>\n        <div style=\"text-align:center;margin-bottom:22px\">\n          <div style=\"font-family:'Orbitron';font-weight:800;font-size:26px;letter-spacing:6px;color:var(--accent);text-shadow:0 0 20px var(--accent)\">NOVA<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--muted);letter-spacing:1px;margin-top:4px\">Personal Finance Intelligence<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:4px;background:rgba(0,0,0,.25);border-radius:8px;padding:3px;margin-bottom:20px\">\n          <button onclick=\"{{ toAuthLogin }}\" style=\"flex:1;background:{{ loginTabBg }};color:{{ loginTabColor }};border:none;border-radius:6px;padding:9px;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase\">Sign in<\u002Fbutton>\n          <button onclick=\"{{ toAuthSignup }}\" styl font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase\">Coming in 7 days<\u002Fdiv>\n          <div style=\"font-family:'Orbitron';font-weight:800;font-size:22px;margin:6px 0;color:var(--accent)\">{{ weekAheadStr }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--muted)\">Every Sunday, drop your fresh RBC CSV to refresh this.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BILLS & PAYMENTS -->\n    <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:20px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap\">\n        <div style=\"width:9px;height:9px;background:var(--accent);border-radius:2px;box-shadow:0 0 8px var(--accent)\"><\u002Fdiv>\n        <div style=\"font-family:'Orbitron';font-size:13px;letter-spacing:3px;text-transform:uppercase\">Bills &amp; Payments<\u002Fdiv>\n        <div style=\"flex:1;height:1px;background:var(--line);min-width:20px\"><\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--muted)\">{{ billsHeadline }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- filter tabs -->\n      <div style=\"display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap\">\n        <sc-for list=\"{{ billFilters }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ f.set }}\" style=\"background:{{ f.bg }};color:{{ f.color }};border:1px solid {{ f.border }};border-radius:9px;padding:7px 14px;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase\">{{ f.label }} <span style=\"opacity:.6\">{{ f.count }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- bill cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px;margin-bottom:18px\">\n        <sc-for list=\"{{ billCards }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div style=\"background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:15px;position:relative;overflow:hidden\">\n            <div style=\"position:absolute;top:0;left:0;width:100%;height:3px;background:{{ b.barColor }}\"><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:6px\">\n              <div style=\"display:flex;flex-direction:column;gap:5px;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap\">\n                  <span style=\"font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:{{ b.kindColor }};border:1px solid {{ b.kindColor }};border-radius:5px;padding:1px 6px\">{{ b.kindLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ b.autopay }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ok)\">⟳ auto<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-weight:600;font-size:15px;line-height:1.2\">{{ b.name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ b.remove }}\" style=\"background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0;flex-shrink:0\">×<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-family:'Orbitron';font-weight:700;font-size:22px;margin:9px 0 4px\">{{ b.amtStr }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:6px\">\n              <span style=\"font-family:'Orbitron';font-size:13px;font-weight:700;color:{{ b.barColor }}\">{{ b.countdown }}<\u002Fspan>\n              <span style=\"font-size:13px;color:var(--muted)\">· {{ b.scheduleStr }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ b.isVariable }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:2px 0 5px\">\n                <div style=\"height:100%;width:{{ b.usePct }};background:{{ b.useColor }};border-radius:4px;transition:width .5s\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:{{ b.useColor }}\">{{ b.useStr }}<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.meta }}\" hint-placeholder-val=\"\">\n              <div style=\"font-size:12px;color:var(--muted);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ b.meta }}<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.showPaid }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ b.togglePaid }}\" style=\"margin-top:10px;width:100%;background:{{ b.paidBg }};color:{{ b.paidColor }};border:1px solid var(--line);border-radius:8px;padding:6px;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase\">{{ b.paidLabel }}<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- add bill form -->\n      <div style=\"border:1px dashed var(--line);border-radius:14px;padding:16px\">\n        <div style=\"font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:13px\">Add a bill<\u002Fdiv>\n\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:11px\">\n          <input ref=\"{{ billName }}\" placeholder=\"Bill name (e.g. Rent, Netflix, Dentist)\" style=\"flex:2;min-width:170px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px\">\n          <div style=\"display:flex;align-items:center;gap:6px;flex:1;min-width:120px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:0 11px\">\n            <span style=\"font-family:'Orbitron';color:var(--muted)\">$<\u002Fspan>\n            <input ref=\"{{ billAmt }}\" type=\"number\" placeholder=\"0.00\" style=\"flex:1;background:none;border:none;color:var(--text);font-size:14px;padding:9px 0;outline:none;width:100%\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-bottom:11px;align-items:flex-start\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <span style=\"font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase\">Type<\u002Fspan>\n            <div style=\"display:flex;gap:4px;background:rgba(0,0,0,.25);border-radius:8px;padding:3px\">\n              <sc-for list=\"{{ kindOptions }}\" as=\"k\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ k.set }}\" style=\"background:{{ k.bg }};color:{{ k.color }};border:none;border-radius:6px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer\">{{ k.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showSchedule }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <span style=\"font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase\">Repeats<\u002Fspan>\n              <div style=\"display:flex;gap:4px;background:rgba(0,0,0,.25);border-radius:8px;padding:3px\">\n                <sc-for list=\"{{ scheduleOptions }}\" as=\"sc\" hint-placeholder-count=\"2\">\n                  <button onclick=\"{{ sc.set }}\" style=\"background:{{ sc.bg }};color:{{ sc.color }};border:none;border-radius:6px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer\">{{ sc.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showDay }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <s        <div style=\"display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px\">\n            <span style=\"font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase\">Account (optional)<\u002Fspan>\n            <input ref=\"{{ billAccount }}\" placeholder=\"e.g. RBC Chequing\" style=\"background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px\">\n          <\u002Fdiv>\n          <button onclick=\"{{ toggleFormAutopay }}\" style=\"background:{{ autopayBg }};color:{{ autopayColor }};border:1px solid var(--line);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;text-transform:uppercase\">⟳ Autopay {{ autopayState }}<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <input ref=\"{{ billNotes }}\" placeholder=\"Notes (optional) — e.g. shared with roommate\" style=\"flex:1;min-width:200px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px\">\n          <button onclick=\"{{ addBill }}\" style=\"background:var(--accent);color:#1a1406;border:none;border-radius:8px;padding:9px 24px;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;text-transform:uppercase\">+ Add bill<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:13px;color:var(--muted);margin-top:12px\">{{ billsFootnote }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- GRID: income / savings / category -->\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:20px\">\n\n      <!-- INCOME & PAYDAY -->\n      <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">\n          <div style=\"width:9px;height:9px;background:var(--ok);border-radius:2px;box-shadow:0 0 8px var(--ok)\"><\u002Fdiv>\n          <div style=\"font-family:'Orbitron';font-size:13px;letter-spacing:3px;text-transform:uppercase\">Income<\u002Fdiv>\n          <div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px\">\n          <div style=\"font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase\">Next payday<\u002Fdiv>\n          <div style=\"font-family:'Orbitron';font-weight:800;font-size:30px;color:var(--ok);margin:4px 0\">{{ daysToPayday }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:var(--muted)\">{{ nextPaydayStr }} · {{ payAmountStr }} incoming<\u002Fdiv>\n        <\u002Fdiv>\n        <label style=\"font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase\">Monthly income<\u002Flabel>\n        <div style=\"display:flex;align-items:center;gap:8px;margin:6px 0 12px\">\n          <span style=\"font-family:'Orbitron';color:var(--muted)\">$<\u002Fspan>\n          <input type=\"number\" value=\"{{ incomeMonthly }}\" oninput=\"{{ setIncome }}\" style=\"background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Orbitron';font-size:18px;font-weight:700;width:100%\">\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:center\">\n          <label style=\"font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex:1\">Pay cycle<\u002Flabel>\n          <select value=\"{{ payFreq }}\" onchange=\"{{ setFreq }}\" style=\"background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px\">\n            <option value=\"weekly\">Weekly<\u002Foption>\n            <option value=\"biweekly\">Bi-weekly<\u002Foption>\n            <option value=\"semimonthly\">Tw
